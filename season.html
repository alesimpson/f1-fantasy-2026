<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Fantasy 2026 – Season</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>F1 Fantasy 2026 – Season</h1>

<!-- ── Leaderboard ─────────────────────────────────────────────── -->
<section id="leaderboard">
  <h2>Leaderboard</h2>
  <table id="leaderboardTable">
    <tr><th>Fantasy Team</th><th>Total Points</th></tr>
  </table>
</section>

<!-- ── Lineups ─────────────────────────────────────────────────── -->
<section id="lineups">
  <h2>Lineups</h2>
  <div id="lineupContainer"></div>
</section>

<!-- ── Race-by-Race Breakdown ─────────────────────────────────── -->
<section id="raceBreakdown">
  <h2>Race-by-Race Breakdown</h2>
  <div class="race-table-container">
    <table id="raceTable">
      <tr><th>Driver</th></tr>
    </table>
  </div>
</section>

<!-- ── Refresh Race Points ────────────────────────────────────── -->
<section id="refreshSection">
  <h2>Refresh Race Points</h2>
  <select id="raceSelect"></select>
  <button onclick="refreshRacePoints()">Refresh Race Points</button>
</section>

<!-- ── Propose Trade ──────────────────────────────────────────── -->
<section id="tradeSection">
  <h2>Propose Trade</h2>
  <div class="trade-section">
    <div class="trade-col">
      <label>From Team</label>
      <select id="fromTeamSelect" onchange="populateFromDrivers()">
        <option value="">Select Team…</option>
      </select>
      <label>Drivers to trade away</label>
      <select id="fromDriversSelect" multiple></select>
      <label>Sweetener From → To</label>
      <input type="number" id="sweetenerFrom" value="0" min="0" />
    </div>
    <div class="trade-col" style="align-self:center;">
      <button onclick="submitTrade()" style="padding:12px 24px;font-size:16px;">
        ⇄ Execute Trade
      </button>
    </div>
    <div class="trade-col">
      <label>To Team</label>
      <select id="toTeamSelect" onchange="populateToDrivers()">
        <option value="">Select Team…</option>
      </select>
      <label>Drivers to trade away</label>
      <select id="toDriversSelect" multiple></select>
      <label>Sweetener To → From</label>
      <input type="number" id="sweetenerTo" value="0" min="0" />
    </div>
  </div>
</section>

<!-- ── Trade History ──────────────────────────────────────────── -->
<section id="tradeHistory">
  <h2>Trade History</h2>
  <div id="tradeHistoryContainer"></div>
</section>

<!-- ── Free Agents ────────────────────────────────────────────── -->
<section id="freeAgents">
  <h2>Available Free Agents</h2>
  <table id="freeAgentsTable">
    <tr><th>Driver</th></tr>
  </table>
</section>

<script src="season.js"></script>
</body>
</html>
